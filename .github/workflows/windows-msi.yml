name: Build Windows MSI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Show workflow ref
        shell: pwsh
        run: |
          Write-Host "GITHUB_REF=$env:GITHUB_REF"
          Write-Host "GITHUB_SHA=$env:GITHUB_SHA"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Windows EXE and MSI
        shell: pwsh
        run: |
          dotnet publish ./OfflineMinecraftLauncher.csproj -c Release -r win-x64 -o ./dist/publish/win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:PublishReadyToRun=false
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed with exit code $LASTEXITCODE" }

          dotnet tool restore
          if ($LASTEXITCODE -ne 0) { throw "dotnet tool restore failed with exit code $LASTEXITCODE" }

          New-Item -ItemType Directory -Force -Path ./dist/installer | Out-Null
          dotnet tool run wix -- build -arch x64 -src ./packaging/AetherLauncher.wxs -out ./dist/installer/AetherLauncher-Setup.msi
          if ($LASTEXITCODE -ne 0) { throw "wix build failed with exit code $LASTEXITCODE" }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherLauncher-Setup-msi
          path: dist/installer/AetherLauncher-Setup.msi
          if-no-files-found: error

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherLauncher-win-x64-exe
          path: dist/publish/win-x64/AetherLauncher.exe
          if-no-files-found: error
